<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>PANZERKNACKER</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="game">
    <button id="pauseBtn" title="Pause">&#10073;&#10073;</button>
    <button id="muteBtn" title="Ton an/aus">&#9835;</button>
    <button id="endlessBtn" class="hidden">Endlos weiterspielen &#8594;</button>
    <button id="dashBtn" class="hidden">DASH</button>
    <canvas id="canvas" width="768" height="512"></canvas>
    <div id="rotate" class="overlay rotate-overlay">
      <h1>&#8635;</h1>
      <p>Bitte Ger&auml;t drehen</p>
    </div>
    <p class="hint">WASD: fahren &middot; Maus: zielen &middot; Klick: schie&szlig;en &middot; Leertaste: Mine &middot; F1: Debug</p>
    <div id="start" class="overlay">
      <h1>PANZERKNACKER</h1>
      <div id="modeSelect" class="modes">
        <button data-mode="leicht">Leicht</button>
        <button data-mode="normal" class="active">Normal</button>
        <button data-mode="schwer">Schwer</button>
      </div>
      <label for="seedInput">Seed (leer = zufällig)</label>
      <input id="seedInput" inputmode="numeric" autocomplete="off" placeholder="z.B. 4711" />
      <button id="startBtn">Start</button>
      <button id="dailyBtn" class="secondary">Tages-Seed spielen</button>
      <div class="opts">
        <label><input type="checkbox" id="optThreat" checked /> Bedrohungslinien</label>
        <label><input type="checkbox" id="optMotion" /> Reduzierte Bewegung</label>
      </div>
      <p id="beststats" class="beststats"></p>
      <button id="resetBtn" class="linklike">Bestwerte zur&uuml;cksetzen</button>
    </div>
  </main>
  <!-- Inline-Guard laeuft auch bei file:// (wo Modul-Skripte blockiert
       werden). Zeigt einen Hinweis, statt einen schwarzen Bildschirm. -->
  <script>
    if (location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', function () {
        var b = document.createElement('div');
        b.style.cssText =
          'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;' +
          'padding:24px;background:#14141a;color:#e8e4d8;font-family:monospace;font-size:15px;' +
          'text-align:center;white-space:pre-wrap;z-index:99;line-height:1.6';
        b.textContent =
          'PANZERKNACKER läuft nicht per Doppelklick (file://).\n\n' +
          'Bitte über einen Webserver öffnen — z. B. im Projektordner:\n' +
          '  npx serve .   (dann http://localhost:3000)\n\n' +
          'oder die veröffentlichte URL (GitHub Pages) verwenden.';
        document.body.appendChild(b);
      });
    } else {
      window.addEventListener('error', function (e) {
        if (!/main\.js|src\//.test(e.filename || '')) return;
        var b = document.createElement('div');
        b.style.cssText =
          'position:fixed;bottom:0;left:0;right:0;padding:10px;background:#601010;' +
          'color:#fff;font-family:monospace;font-size:12px;z-index:99';
        b.textContent = 'Fehler: ' + e.message + ' (' + (e.filename || '') + ':' + e.lineno + ')';
        document.body.appendChild(b);
      });
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
